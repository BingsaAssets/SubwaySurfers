<!DOCTYPE html>
<html lang="en-us">
<head>
    <meta charset="utf-8">
    <title>Subway Surfers</title>
</head>
<body>

    <script>
        window.config = {
            loader: 'unity',
            debug: false,
            maxRatio: 16 / 9,
            minRatio: 9 / 16,
            title: 'Subway Surfers',
            // unity.js reads this to create the <script> tag for the loader
            unityWebglLoaderUrl: './UnityLoader.2019.2.js',
            unityWebglBuildUrl: 'Build/SanFrancisco.json',
            fileSize: 35,
            // set numScreenshots to 0 so the slideshow loop never runs
            numScreenshots: 0,
            // blank thumbnail so unity.js img element doesn't 404
            thumbnail: 'data:image/gif;base64,R0lGODlhAQABAAD/ACwAAAAAAQABAAACADs=',
            cachedDecompressedFileSizes: {
                'SanFrancisco.asm.code.unityweb':       9077143,
                'SanFrancisco.asm.framework.unityweb':  86369,
                'SanFrancisco.asm.memory.unityweb':     951447,
                'SanFrancisco.data.unityweb':           18323917,
                'SanFrancisco.wasm.code.unityweb':      7279617,
                'SanFrancisco.wasm.framework.unityweb': 90693,
            },
        };
    </script>

    <!-- PokiSDK stub — satisfies the game's C# bridge without loading any ads -->
    <script>
        window.PokiSDK = {
            init:                           function() { return Promise.resolve(); },
            commercialBreak:                function() { return Promise.resolve(); },
            rewardedBreak:                  function() { return Promise.resolve(false); },
            gameLoadingStart:               function() {},
            gameLoadingFinished:            function() {},
            gameLoadingProgress:            function() {},
            gameInteractive:                function() {},
            roundStart:                     function() {},
            roundEnd:                       function() {},
            gameplayStart:                  function() {},
            gameplayStop:                   function() {},
            happyTime:                      function() {},
            setDebug:                       function() {},
            logError:                       function() {},
            customEvent:                    function() {},
            setPlayerAge:                   function() {},
            togglePlayerAdvertisingConsent: function() {},
            displayAd:                      function() {},
            destroyAd:                      function() {},
            getLeaderboard:                 function() { return Promise.resolve([]); },
            sendHighscore:                  function() {},
        };
    </script>

    <!-- Unity WASM module (must load before UnityLoader) -->
    <script src="./4399.js"></script>

    <!-- Boot logic + initPokiBridge.
         unity.js dynamically injects UnityLoader via unityWebglLoaderUrl,
         so we do NOT load UnityLoader.2019.2.js separately here. -->
    <script src="./unity.js"></script>

</body>
</html>
