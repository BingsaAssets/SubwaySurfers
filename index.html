<!DOCTYPE html>

<html lang="en-us">
<head>
<meta charset="utf-8">
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
<title>Subway Surfers | Clean Port</title>
<style>
/* Full screen setup /
body, html {
margin: 0;
padding: 0;
width: 100%;
height: 100%;
background-color: #002B50; / Original SS background color */
overflow: hidden;
display: flex;
align-items: center;
justify-content: center;
}

    #gameContainer {
        width: 100vw;
        height: 100vh;
    }

    canvas {
        width: 100%;
        height: 100%;
        display: block;
    }
</style>


</head>
<body>
<div id="gameContainer"></div>

<!-- We use the loader you have in your GitHub root -->
<script src="UnityLoader.2019.2.js"></script>

<script>
    /**
     * CLEAN BOOT LOGIC
     * We skip master-loader.js because it contains the ad-logic and domain locks.
     * We point directly to your 'Build' folder assets.
     */
    const gameInstance = UnityLoader.instantiate("gameContainer", "Build/SanFrancisco.json", {
        onProgress: UnityProgress
    });

    function UnityProgress(gameInstance, progress) {
        if (!gameInstance.Module) return;
        // The game is loading... you could add a custom logo here if you wanted.
        if (progress === 1) {
            console.log("Subway Surfers San Francisco Loaded Successfully.");
        }
    }

    // Handle window resizing to keep the game crisp
    window.addEventListener('resize', () => {
        const canvas = document.querySelector('canvas');
        if (canvas) {
            canvas.style.width = "100%";
            canvas.style.height = "100%";
        }
    });
</script>


</body>
</html>
